name: sanitizers

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    name: ${{ matrix.name }}
    env:
      CC: clang
      CXX: clang++
      ASAN_OPTIONS: log_path=stderr:halt_on_error=1:abort_on_error=1
      UBSAN_OPTIONS: log_path=stderr:halt_on_error=1:abort_on_error=1:print_stacktrace=1
      TSAN_OPTIONS: log_path=stderr:halt_on_error=1:abort_on_error=1
      MSAN_OPTIONS: log_path=stderr:halt_on_error=1:abort_on_error=1:print_stacktrace=1
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: asan-ubsan
            SANITIZE: address,undefined
          - name: tsan
            SANITIZE: thread
          - name: msan
            SANITIZE: memory

    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Setup Ccache
      uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt install -y \
          clang \
          lld \
          binutils \
          pkg-config \
          libfreetype6-dev \
          libglib2.0-dev \
          libcairo2-dev \
          libicu-dev \
          libgraphite2-dev
    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.12'
    - name: Install Python Dependencies
      run: pip3 install -r .ci/requirements.txt --require-hashes
    - name: Setup Meson
      run: |
        ccache --version
        meson setup build \
          --default-library=static \
          --buildtype=debugoptimized \
          --wrap-mode=nodownload \
          -Db_sanitize=${{ matrix.SANITIZE }} \
          -Dexperimental_api=true
    - name: Build
      run: meson compile -Cbuild
    - name: Test
      run: meson test -Cbuild -t 10 --print-errorlogs | asan_symbolize | c++filt
