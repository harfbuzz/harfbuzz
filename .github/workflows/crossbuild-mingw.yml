name: crossbuild-mingw

on:
  push:
    branches: [ main ]
    tags: ["*.*.*"]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: win32
            ARCH: 32
            TRIPLET: i686-w64-mingw32
            PACKAGES: g++-mingw-w64-i686 wine wine32 libglew-mingw-w64-dev
          - name: win64
            ARCH: 64
            TRIPLET: x86_64-w64-mingw32
            PACKAGES: g++-mingw-w64-x86-64 wine wine64 wine32:i386 libglew-mingw-w64-dev

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Setup Ccache
      uses: hendrikmuhs/ccache-action@33522472633dbd32578e909b315f5ee43ba878ce # v1.2.22
    - name: Install Dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt install -y \
          zip \
          ${{ matrix.PACKAGES }}
    - name: Install GLFW for MinGW
      run: |
        GLFW_VER=3.4
        GLFW_ZIP=glfw-${GLFW_VER}.bin.WIN${{ matrix.ARCH }}.zip
        wget -q -O /tmp/${GLFW_ZIP} "https://github.com/glfw/glfw/releases/download/${GLFW_VER}/${GLFW_ZIP}"
        GLFW_DIR=$(mktemp -d)
        unzip -q /tmp/${GLFW_ZIP} -d ${GLFW_DIR}
        GLFW_ROOT=${GLFW_DIR}/glfw-${GLFW_VER}.bin.WIN${{ matrix.ARCH }}
        TRIPLET=${{ matrix.TRIPLET }}
        sudo mkdir -p /usr/${TRIPLET}/include/GLFW
        sudo cp ${GLFW_ROOT}/include/GLFW/*.h /usr/${TRIPLET}/include/GLFW/
        sudo cp ${GLFW_ROOT}/lib-mingw-w64/libglfw3.a /usr/${TRIPLET}/lib/
        sudo mkdir -p /usr/${TRIPLET}/lib/pkgconfig
        cat > /tmp/glfw3.pc << EOF
        prefix=/usr/${TRIPLET}
        includedir=\${prefix}/include
        libdir=\${prefix}/lib
        Name: GLFW
        Version: ${GLFW_VER}
        Libs: -L\${libdir} -lglfw3
        Libs.private: -lgdi32
        Cflags: -I\${includedir}
        EOF
        sudo cp /tmp/glfw3.pc /usr/${TRIPLET}/lib/pkgconfig/
    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.12'
    - name: Install Python Dependencies
      run: pip3 install -r .ci/requirements.txt --require-hashes
    - name: Build
      run: bash .ci/build-win.sh ${{ matrix.ARCH }}
    - name: Test
      run: meson devenv -Cbuild-win${{ matrix.ARCH }} meson test -t 10 --print-errorlogs --suite=harfbuzz
    - name: Archive artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: harfbuzz-win${{ matrix.ARCH }}
        path: harfbuzz-win${{ matrix.ARCH }}.zip
        if-no-files-found: error

  release:
    name: Create and populate release
    permissions:
      contents: write
    needs: build
    runs-on: ubuntu-24.04
    if: contains(github.ref, 'refs/tags/')
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true
      - name: Rename artifacts
        run: |
          for file in harfbuzz-win*.zip; do
            mv -v "$file" "${file%.zip}-${{ github.ref_name }}.zip"
          done
      - name: Check for release
        id: create_release
        run: |
          if ! gh release view ${{ github.ref_name }}; then
            gh release create ${{ github.ref_name }} --title ${{ github.ref_name }}
          fi
      - name: Populate release
        run: |
          gh release upload ${{ github.ref_name }} harfbuzz-win*-${{ github.ref_name }}.zip --clobber
