9\u0646\u06cc\u0645\u060c \u06a9\u0627\u0633\u0647 \u062f\u0631\u0633\u062a\n\u0645\u06cc\u200c\u06a9\u0646\u06cc\u0645\u060c \u0639\u0635\u0631 \u06a9\u0647 \u0634\u0648\u0646\u0635\u062f \u062a\u0627 \u06a9\u0627\u0633\u0647 \u062f\u0631\u0633\u062a \u06a9\u0631\u062f\u06cc\u0645\u060c \u062f\u0633\u062a\u06af\u0627\u0631\u0648 \u062a\u0645\u06cc\u0632 \u0645\u06cc\u200c\u06a9\u0646\u06cc\u0645 \u0628\u0631\u0645\u06cc\u200c\u06af\u0631\u062f\u06cc\u0645 \u062e\u0648\u0646\u0647. \u067e\u0627\u0631\u0633\u0627\u0644 \u0647\u0641\u062a\u0647\u200c\u0627\u06cc \u067e\u0646\u062c\u0627\u0647 \u062a\u0648\u0645\u0646 \u0645\u0632\u062f \u0645\u06cc\u200c\u062f\u0627\u062f\u0646. \u0627\u0645\u0633\u0627\u0644 \u062f\u06cc\u06af\u0647 \u062e\u062f\u0627 \u0645\u06cc\u200c\u062f\u0648\u0646\u0647. \u0628\u0627 \u0647\u0645\u0647 \u0627\u06cc\u0646 \u062d\u0631\u0641\u0627\u060c\n\u0628\u0645\u06cc\u0631\u06cc\u0645 \u0628\u0647\u062a\u0631\u0647 \u0622\u0642\u0627! \u0647\u0631 \u0631\u0648\u0632 \u0647\u0631 \u0631\u0648\u0632 \u06a9\u062a\u06a9.  \u0628\u0627\u0628\u0627\u0645 \u062f\u06cc\u0634\u0628 \u0628\u06cc\u062e\u0648\u062f\u06cc \u0645\u0635\u0637\u0641\u06cc \u0631\u0648 \u06af\u0631\u0641\u062a \u0632\u062f. \u06af\u0631\u0641\u062a \u0632\u062f\u0634 \u06af\u0641\u062a: \u00ab\u0686\u0631\u0627 \u0648\u0642\u062a\u06cc \u0645\u06cc\u200c\u0631\u06cc \u062f\u0633\u062a \u0628\u0647 \u0622\u0628\u060c \u0633\u0631 \u067e\u0627 \u0645\u06cc\u200c\u0634\u0627\u0634\u06cc\u061f \u0628\u0634\u06cc \u0628\u0634\u0627\u0634!\u00bb \u0645\u0635\u0637\u0641\u06cc\u200c\u0645\u0648\u0646 \u0647\u06cc\u0686\u06cc \u062d\u0627\u0644\u06cc\u0634\n\u0646\u0645\u06cc\u200c\u0634\u0647. \u0642\u062f \u0632\u0647\u0631\u0627\u0645\u0648\u0646 \u0628\u0648\u062f\u0647 \u06a9\u0647 \u0627\u0632 \u0628\u0627\u0644\u0627 \u067e\u0634\u062a \u0628\u0648\u0645 \u0627\u0641\u062a\u0627\u062f\u0647\u060c \u0631\u06af \u06a9\u0644\u0647\u200c\u0627\u0634 \u062a\u06a9\u0648\u0646 \u062e\u0631\u062f\u0647. \u062d\u0627\u0644\u0627 \u0633\u06cc\u0632\u062f\u0647 \u0633\u0627\u0644\u0634\u0647. \u0646\u0647 \u0686\u0627\u0631\u062f\u0647\u060c\u200c \u0686\u0627\u0631\u062f\u0647 \u0633\u0627\u0644\u0634\u0647. \u062f\u0627\u062f\u0627\u0634 \u0628\u0632\u0631\u06af\u200c \u0645\u0648\u0646\u0647. \u0627\u0644\u0627\u0646 \u0645\u062f\u0631\u0633\u0647 \u0639\u0642\u0628 \u0627\u0641\u062a\u0627\u062f\u0647\u200c\u0647\u0627 \u062f\u0631\u0633\n\u0645\u06cc\u200c\u062e\u0648\u0646\u0647. \u0622\u0628\u060c \u0628\u0627\u0628\u0627\u060c \u0628\u0627\u0631 \u0645\u06cc\u062e\u0648\u0646\u0647 \u06cc\u0627\u062f \u0628\u06af\u06cc\u0631\u0647\u060c \u0628\u06cc\u0627\u062f \u062c\u0644\u0648. \u062f\u0648 \u0633\u0647 \u06a9\u0644\u0645\u0647 \u0628\u0644\u062f\u0647 \u062d\u0631\u0641 \u0628\u0632\u0646\u0647 \u0648\u0644\u06cc \u0686\u06cc\u0632\u0647... \u0646\u0645\u06cc\u062a\u0648\u0646\u0647 \u0642\u0634\u0646\u06af \u062d\u0631\u0641 \u0628\u0632\u0646\u0647. \u0628\u0627\u0628\u0627\u0645 \u0645\u06cc\u200c\u062e\u0648\u0627\u062f \u0627\u0632 \u0645\u062f\u0631\u0633\u0647 \u0648\u0631\u0634 \u062f\u0627\u0631\u0647\u060c \u0628\u0630\u0627\u0631\u0647 \u06cc\u0647 \u062c\u0627 \u06a9\u0647 \u06a9\u0627\u0631\n\u06cc\u0627\u062f \u0628\u06af\u06cc\u0631\u0647. \u0628\u0627\u0628\u0627 \u0632\u0647\u0631\u0627 \u0631\u0627 \u0627\u0632 \u0647\u0645\u0647 \u0628\u06cc\u0634\u062a\u0631 \u0645\u06cc\u200c\u062e\u0648\u0627\u062f. \u0627\u0648\u0646 \u0647\u0645 \u0647\u0631 \u06a9\u0627\u0631\u06cc \u062f\u0644\u0634 \u0628\u062e\u0648\u0627\u062f \u0645\u06cc\u200c\u06a9\u0646\u0647. \u0647\u0631\u0686\u06cc \u0645\u06cc\u200c\u06af\u06cc\u0645 \u06af\u0648\u0634 \u0646\u0645\u06cc\u200c\u06a9\u0646\u0647\u060c \u0645\u06cc\u200c\u0631\u0647 \u062a\u0648 \u062c\u0648\u0628 \u0645\u062d\u0644 \u06a9\u062b\u0627\u0641\u062a\u200c\u06a9\u0627\u0631\u06cc \u0645\u06cc\u200c\u06a9\u0646\u0647. \u0627\u0648\u0646 \u0631\u0648\u0632\u06cc \u062d\u0648\u0627\u0633\u0645 \u0646\u0628\u0648\u062f\u060c \u0631\u0641\u062a\n\u06cc\u0647 \u0645\u0634\u062a \u062f\u06cc\u06af \u0645\u0648\u0646\u062f\u0647 \u0633\u0631 \u06a9\u0648\u0686\u0647 \u0628\u0648\u062f \u0648\u0631\u062f\u0627\u0634\u062a \u062e\u0648\u0631\u062f. \u0634\u0628 \u062f\u0644\u0634 \u062f\u0631\u062f \u06af\u0631\u0641\u062a \u0646\u0632\u062f\u06cc\u06a9 \u0628\u0648\u062f \u0628\u0645\u06cc\u0631\u0647. \u0627\u0648\u0646\u0648\u0642\u062a \u0628\u0627\u0628\u0627\u0645 \u0627\u0648\u0645\u062f \u06af\u0631\u0641\u062a \u0645\u0646\u0648 \u0628\u0627 \u0634\u06cc\u0644\u0646\u06af \u06a9\u0634\u062a. \u0622\u0642\u0627 \u0645\u06af\u0647 \u0634\u0647\u0631 \u0647\u0631\u062a\u0647\u061f \u062e\u0631 \u06a9\u062a\u06a9 \u0645\u06cc\u200c\u062e\u0648\u0631\u0647. \u062f\u06cc\u06af\u0647 \u0686\u0631\u0627 \u0645\u0627 \u0631\u0648\n\u0645\u06cc\u200c\u0632\u0646\u0646\u061f \u0628\u0631\u0646 \u0628\u0647 \u062e\u0631 \u0628\u0632\u0646\u0646! \u0622\u062e\u0647 \u0645\u0646 \u06a9\u0647 \u0646\u0645\u06cc\u200c\u062a\u0648\u0646\u0645 \u0647\u0645\u0647\u200c\u0634 \u0645\u0648\u0627\u0638\u0628 \u0632\u0647\u0631\u0627 \u0628\u0627\u0634\u0645. \u0631\u0627\u0633\u062a\u06cc \u06cc\u0647 \u0635\u0627\u062d\u0628 \u062d\u06cc\u0627\u0637 \u062f\u0627\u0631\u06cc\u0645\u060c \u062e\u06cc\u0644\u06cc \u0628\u062f \u0627\u062e\u0644\u0627\u0642\u0647 \u0622\u0642\u0627! \u0627\u0633\u0645\u0634 \u0639\u0628\u0627\u0633 \u0622\u0642\u0627\u0633. \u0635\u0628\u062d \u0645\u06cc\u200c\u0631\u0647 \u0638\u0647\u0631 \u0645\u06cc\u200c\u0622\u062f. \u0633\u067e\u0648\u0631 \u0634\u0647\u0631\u062f\u0627\u0631\u06cc\u0647.\n\u0628\u06cc\u0633\u062a \u0648 \u0686\u0627\u0631 \u0633\u0627\u0639\u062a \u0645\u06cc\u200c\u0622\u062f \u0628\u0646\u062f \u0645\u06cc\u06a9\u0646\u0647 \u0628\u0647 \u0645\u0627\u060c \u0645\u06cc\u06af\u0647: \u00ab\u0622\u0628 \u0632\u06cc\u0627\u062f \u0645\u0635\u0631\u0641 \u0646\u06a9\u0646\u06cc\u0646\u060c \u0686\u0627\u0647 \u067e\u0631 \u0645\u06cc\u0634\u0647.\u00bb \u0632\u0647\u0631\u0627\u0645\u0648\u0646 \u06a9\u0647 \u06af\u0627\u0647\u06cc \u06af\u0631\u06cc\u0647 \u0645\u06cc\u200c\u06a9\u0646\u0647\u060c \u062f\u0627\u062f\u0634 \u0628\u0644\u0646\u062f \u0645\u06cc\u200c\u0634\u0647 \u0645\u06cc\u200c\u06af\u0647: \u00ab\u0635\u062f\u0627\u06cc \u0627\u06cc\u0646 \u062a\u062e\u0645\u200c\u0633\u06af\u0648 \u062e\u0641\u0647 \u06a9\u0646\u06cc\u0646!\u00bb\n\u0627\u0648\u0646\u0648\u0642\u062a \u06a9\u0647 \u0645\u0627\u062f\u0631\u0645\u0648\u0646 \u0632\u0646\u062f\u0647 \u0628\u0648\u062f\u060c \u06cc\u0647 \u062f\u0641\u0639\u0647 \u0645\u06cc\u200c\u062e\u0648\u0627\u0633\u062a \u0627\u0632 \u062f\u0633\u062a \u0639\u0628\u0627\u0633 \u0622\u0642\u0627 \u0646\u0641\u062a \u0628\u0631\u06cc\u0632\u0647 \u0633\u0631\u0634\u060c \u062e\u0648\u062f\u0634\u0648 \u0622\u062a\u06cc\u0634 \u0628\u0632\u0646\u0647. \u0639\u0628\u0627\u0633 \u0622\u0642\u0627 \u0627\u0635\u0644\u0627\u064b \u0631\u062d\u0645 \u062d\u0627\u0644\u06cc\u0634 \u0646\u0645\u06cc\u200c\u0634\u0647\u061b \u067e\u0633\u0631 \u0633\u06cc\u0632\u062f\u0647 \u0633\u0627\u0644\u0647\u200c\u0634\u0648 \u06af\u0631\u0641\u062a\u0647 \u0627\u0632 \u062e\u0648\u0646\u0647 \u0627\u0646\u062f\u0627\u062e\u062a\u0647\n\u0628\u06cc\u0631\u0648\u0646. \u0627\u0648\u0646 \u0647\u0645 \u0631\u0641\u062a\u0647 \u062a\u0648\u06cc \u06a9\u0648\u0686\u0647\u200c \u067e\u0633 \u200c\u06a9\u0648\u0686\u0647\u200c\u200c\u0647\u0627 \u0648\u0644 \u0634\u062f\u0647. \u062d\u0627\u0644\u0627 \u062e\u062f\u0627 \u0645\u06cc\u200c\u062f\u0648\u0646\u0647 \u06a9\u062c\u0627\u0633\u060c \u0686\u0647 \u06a9\u0627\u0631 \u0645\u06cc\u200c\u06a9\u0646\u0647\u060c\u200c \u0627\u0632 \u06a9\u062c\u0627 \u0645\u06cc\u200c\u0622\u0631\u0647 \u0645\u06cc\u200c\u062e\u0648\u0631\u0647. \u0628\u0686\u0647\u200c\u0647\u0627 \u0645\u06cc\u200c\u06af\u0646: \u00ab\u0634\u0628\u200c\u0647\u0627 \u0645\u06cc\u200c\u0631\u0647 \u062a\u0648\u06cc \u067e\u0627\u0631\u06a9\u200c\u0647\u0627 \u067e\u06cc\u0634 \u0633\u06af\u0647\u0627\n\u0645\u06cc\u200c\u062e\u0648\u0627\u0628\u0647.\u00bb \u06a9\u0647 \u0631\u0641\u062a\u0647 \u062f\u0647\u0627\u062a \u062e\u0648\u0646\u0647\u0654 \u0628\u0627\u0628\u0627\u0634\u060c \u0645\u06cc\u200c\u06af\u0647 \u062f\u06cc\u06af\u0647 \u0646\u0645\u06cc\u200c\u0622\u0645 \u062a\u0647\u0631\u0627\u0646. \u0622\u0642\u0627\u060c \u0645\u0627 \u0647\u0645 \u062f\u0644\u0645\u0648\u0646 \u0645\u06cc\u200c\u062e\u0648\u0627\u062f \u0645\u06cc\u0631\u0641\u062a\u06cc\u0645 \u062f\u0647\u0645\u0648\u0646 \u0628\u0627 \u06af\u0648\u0633\u0641\u0646\u062f\u0647\u0627 \u0628\u0627\u0632\u06cc \u0645\u06cc\u200c\u06a9\u0631\u062f\u06cc\u0645\u061b \u0628\u0627 \u0628\u0627\u0628\u0627 \u0628\u0632\u0631\u06af\u200c\u0645\u0648\u0646 \u0645\u06cc\u200c\u0631\u0641\u062a\u06cc\u0645 \u062f\u0634\u062a \u0628\u0632\n\u0645\u06cc\u200c\u0686\u0631\u0648\u0646\u062f\u06cc\u0645\u060c\u200c \u0628\u0627\u062f\u0648\u0645 \u067e\u0627\u06a9 \u0645\u06cc\u200c\u06a9\u0631\u062f\u06cc\u0645\u060c \u0627\u0646\u06af\u0648\u0631 \u0645\u06cc\u200c\u0686\u06cc\u062f\u06cc\u0645. \u062f\u0647\u0645\u0648\u0646 \u0648\u0644\u06cc \u062e\u06cc\u0644\u06cc \u062f\u0648\u0631\u0647 \u0622\u062e\u0647! \u0632\u0646 \u0639\u0628\u0627\u0633 \u0622\u0642\u0627 \u062d\u0642 \u062f\u0627\u0631\u0647\u060c \u0622\u0642\u0627! \u0645\u062d\u0644\u0647\u200c\u0645\u0648\u0646 \u062e\u06cc\u0644\u06cc \u0628\u062f\u0647. \u0647\u0631 \u0631\u0648\u0632 \u0627\u0648\u0646\u062c\u0627 \u062f\u0639\u0648\u0627\u0633\u060c \u062f\u0639\u0648\u0627\u060c \u0686\u0627\u0642\u0648 \u06a9\u0634\u06cc. \u062a\u0648\u06cc \u062e\u0631\u0627\u0628\u0647\n\u0647\u0645 \u067e\u0631 \u0645\u0639\u062a\u0627\u062f\u0647\u060c \u0628\u06af\u06cc \u062f\u0648\u0647\u0632\u0627\u0631 \u062a\u0627 \u0647\u0645 \u0628\u06cc\u0634\u062a\u0631. \u0645\u06cc\u200c\u0631\u0646 \u0627\u0648\u0646\u062c\u0627 \u0642\u0645\u0627\u0631 \u0645\u06cc\u200c\u06a9\u0646\u0646\u060c \u0634\u06cc\u0631\u0647 \u0645\u06cc\u200c\u06a9\u0634\u0646\u060c \u0622\u0645\u067e\u0648\u0644 \u0645\u06cc\u200c\u0632\u0646\u0646 \u062a\u0648 \u0631\u06af\u0634\u0648\u0646. \u0645\u0627\u0647\u0645 \u0627\u0632 \u062a\u0631\u0633 \u0645\u0639\u062a\u0627\u062f\u0647\u0627 \u062c\u0631\u0623\u062a \u0646\u0645\u06cc\u200c\u06a9\u0646\u06cc\u0645 \u0627\u0632 \u062e\u0648\u0646\u0647 \u0628\u0631\u06cc\u0645 \u06a9\u0648\u0686\u0647\u060c \u06cc\u0647 \u0630\u0631\u0647 \u0628\u0627\u0632\u06cc\n\u06a9\u0646\u06cc\u0645. \u0627\u0632 \u06a9\u0645\u06cc\u062a\u0647\u200c\u0645 \u0646\u0645\u06cc\u200c\u062a\u0631\u0633\u0646\u060c \u0645\u06cc\u06af\u06cc\u0631\u0646 \u0628\u0686\u0647\u200c\u0647\u0627\u06cc \u0645\u0631\u062f\u0645\u0648 \u0645\u06cc\u200c\u062f\u0632\u062f\u0646\u060c \u0645\u06cc\u0628\u0631\u0646 \u062a\u0648\u06cc \u06a9\u0648\u0631\u0647\u200c\u0647\u0627\u060c\u200c \u062a\u0648\u06cc \u062f\u0644\u0627\u0634\u0648\u0646 \u0686\u06cc\u0632 \u0642\u0627\u06cc\u0645 \u0645\u06cc\u200c\u06a9\u0646\u0646\u061b \u0647\u0631\u0648\u0626\u06cc\u0646 \u0642\u0627\u06cc\u0645 \u0645\u06cc\u06a9\u0646\u0646. \u06cc\u0647 \u0627\u0645\u06cc\u0631 \u0631\u06cc\u0632\u0647 \u0647\u0633\u062a \u062a\u0631\u06cc\u0627\u06a9\u06cc\u0647\u060c \u0627\u0648\u0646 \u0631\u0648\u0632\u06cc \u0627\u0648\u0645\u062f\n\u062e\u0631\u0645 \u06a9\u0646\u0647\u060c \u06af\u0641\u062a: \u00ab\u0628\u06cc\u0627 \u0633\u0648\u0627\u0631 \u0645\u0627\u0634\u06cc\u0646 \u0628\u0634\u06cc\u0645\u060c \u0628\u0631\u06cc\u0645 \u06cc\u0647 \u062c\u0627\u0626\u06cc.\u00bb \u0645\u0646 \u0647\u0645 \u0627\u0632 \u062a\u0631\u0633\u0645 \u062e\u0631 \u0646\u0634\u062f\u0645. \u06cc\u0647 \u0686\u06cc\u0632 \u062e\u0646\u062f\u0647 \u062f\u0627\u0631 \u0628\u06af\u0645 \u0628\u062e\u0646\u062f\u06cc\u060c \u0622\u0642\u0627: \u0627\u06cc\u0646\u0648\u0631\u0645\u0648\u0646 \u06cc\u0647 \u0647\u0645\u0633\u0627\u06cc\u0647 \u062f\u0627\u0631\u06cc\u0645\u060c \u0627\u0633\u0645\u0634 \u0631\u0628\u0627\u0628\u0647. \u0627\u0646\u0648\u0642\u062a \u062a\u0648\u067e\u060c\u200c \u0644\u0646\u06af\u0647 \u06a9\u0641\u0634\u060c\n\u062a\u0646\u06a9\u0647\u060c \u0647\u0631\u0686\u06cc \u0628\u06cc\u0641\u062a\u0647 \u062e\u0648\u0646\u0634\u0648\u0646\u060c\u200c \u0634\u0648\u0647\u0631\u0634 \u0648\u0631 \u0645\u06cc\u200c\u062f\u0627\u0631\u0647 \u0645\u06cc\u200c\u0627\u0646\u062f\u0627\u0632\u0647 \u062a\u0648\u06cc \u0622\u0628 \u0627\u0646\u0628\u0627\u0631\u0634\u0648\u0646. \u0647\u0631\u0648\u0642\u062a \u0647\u0645 \u06a9\u0648\u0686\u0647 \u0634\u0644\u0648\u063a \u0628\u0634\u0647\u060c \u0634\u0648\u0647\u0631 \u0631\u0628\u0627\u0628 \u0645\u06cc\u200c\u0627\u0653\u062f \u0628\u06cc\u0631\u0648\u0646 \u0645\u06cc\u200c\u06af\u0647: \u00ab\u0648\u0627\u0642\u060c \u0639\u0648!\u00bb \u0627\u0648\u0646 \u0647\u0645 \u0645\u062b \u0645\u0635\u0637\u0641\u06cc\u200c \u0645\u0627 \u0644\u0642\u0648\u0647\u200c\u0627\u06cc\u0647\u200c\u061b\n\u062f\u0633\u062a\u0634 \u0645\u06cc\u200c\u0644\u0632\u0631\u0647\u060c \u0647\u0645\u0647 \u062c\u0627\u0634 \u0645\u06cc\u200c\u0644\u0631\u0632\u0647. \u0627\u0648\u0646 \u0631\u0648\u0632 \u0627\u0648\u0645\u062f \u062f\u0645 \u062f\u06a9\u0648\u0646\u060c \u0631\u0641\u062a \u0627\u0648\u0646\u0648\u0631 \u062c\u0648\u0628 \u0646\u0634\u062a. \u0627\u06cc\u0646 \u06cc\u06a9\u06cc \u0647\u0645\u0633\u0627\u06cc\u0647\u200c\u0645\u0648\u0646 \u0631\u0641\u062a \u06cc\u0647 \u06a9\u062a\u0627\u0628 \u062f\u0631\u0628\u0627\u0631\u0647\u0654 \u062e\u062f\u0627 \u0648 \u0641\u0631\u0634\u062a\u0647\u200c\u0647\u0627 \u0622\u0648\u0631\u062f \u0628\u0631\u0627\u0634 \u062e\u0648\u0646\u062f. \u0631\u0628\u0627\u0628 \u062e\u0627\u0646\u0645 \u062e\u0648\u062f\u0634 \u062e\u0648\u0646\u0647 \u06cc\u0647\n\u0627\u0639\u06cc\u0648\u0646\u0647 \u06a9\u0627\u0631 \u0645\u06cc\u200c\u06a9\u0646\u0647\u061b \u0686\u06cc\u0632\u0627\u0634\u0648\u0646\u0648 \u0645\u06cc\u200c\u0634\u0648\u0631\u0647\u060c \u0628\u0627\u063a\u200c\u0634\u0648\u0646\u0648 \u0622\u0628 \u0645\u06cc\u200c\u062f\u0647\u061b \u06a9\u0644\u0641\u062a\u06cc \u0645\u06cc\u200c\u06a9\u0646\u0647. \u0628\u0639\u062f \u0647\u0645\u0647\u200c\u0634 \u0645\u06cc\u200c\u0622\u062f \u067e\u0632 \u0627\u0631\u0628\u0627\u0628\u0634\u0648 \u0645\u06cc\u200c\u062f\u0647. \u0627\u0644\u0627\u0646 \u062f\u06cc\u06af\u0647 \u0647\u0645\u0647 \u0627\u0647\u0644 \u0645\u062d\u0644 \u0645\u06cc\u200c\u062f\u0648\u0646\u0646 \u0628\u0627\u063a \u062e\u0648\u0646\u0647\u0654 \u0627\u0631\u0628\u0627\u0628 \u0631\u0628\u0627\u0628 \u062e\u0627\u0646\u0648\u0645\n\u0627\u0646\u062f\u0627\u0632\u0647 \u067e\u0627\u0631\u06a9 \u0634\u0647\u0631\u0647. \u0627\u0633\u062a\u062e\u0631\u0634 \u0627\u0632 \u0645\u0627\u0644 \u067e\u0627\u0631\u06a9 \u0634\u0647\u0631 \u0647\u0645 \u06af\u0646\u062f\u0647\u200c\u062a\u0631\u0647. \u0647\u0631\u0648\u0642\u062a \u0647\u0645 \u06a9\u0647 \u0627\u0631\u0628\u0627\u0628 \u0645\u06cc\u200c\u062e\u0648\u0627\u062f\u200c \u0622\u0628\u062a\u0646\u06cc \u06a9\u0646\u0647\u060c\u200c \u0627\u0648\u0644 \u06cc\u0647 \u0642\u0637\u0631\u0647 \u062f\u0648\u0627\u06cc \u0645\u062e\u0635\u0648\u0635 \u0647\u0633\u062a\u060c \u0645\u06cc\u200c\u0631\u06cc\u0632\u0647 \u062a\u0648\u06cc \u0627\u0633\u062a\u062e\u0631 \u06a9\u0647 \u0622\u0628\u200c\u0634\u0648 \u0645\u06cc\u200c\u06a9\u0646\u0647 \u0645\u062b \u0627\u0634\u06a9\n\u0686\u0634\u0645. \u0628\u0639\u062f \u0645\u06cc\u200c\u0631\u0647 \u0632\u06cc\u0631 \u062f\u0648\u0634\u060c \u0628\u0627 \u0639\u0637\u0631 \u0648 \u06af\u0644\u0627\u0628 \u062e\u0648\u062f\u0634\u0648 \u0645\u06cc\u200c\u0634\u0648\u0631\u0647. \u0628\u0639\u062f \u0645\u06cc\u200c\u067e\u0631\u0647 \u062a\u0648\u06cc \u0627\u0633\u062a\u062e\u0631\u060c \u0645\u06cc\u200c\u06af\u06cc\u0631\u0647 \u0634\u0648\u062e\u06cc \u0634\u0648\u062e\u06cc \u0622\u0628 \u0645\u06cc\u200c\u067e\u0627\u0634\u0647 \u0628\u0647 \u0631\u0628\u0627\u0628 \u062e\u0627\u0646\u0648\u0645. \u0632\u0646 \u0627\u0631\u0628\u0627\u0628\u0634 \u0647\u0645 \u062e\u0627\u0631\u062c\u06cc\u0647. \u0645\u0627\u0644 \u0647\u0645\u0648\u0646 \u06a9\u0634\u0648\u0631\u06cc\u0647 \u06a9\u0647 \u0634\u06cc\u0634\n\u0645\u0627\u0647 \u0634\u0628\u0647\u060c \u0634\u06cc\u0634 \u0645\u0627\u0647 \u0631\u0648\u0632. \u0631\u0628\u0627\u0628 \u06cc\u0647 \u0686\u0627\u062e\u0627\u0646\u200c\u0647\u0627\u06cc\u06cc \u0645\u06cc\u200c\u06a9\u0646\u0647 \u06a9\u0647 \u06a9\u0644\u0647\u0654 \u0622\u062f\u0645 \u0633\u0648\u062a \u0645\u06cc\u200c\u06a9\u0634\u0647! \u0645\u06cc\u200c\u06af\u0647 \u0627\u0631\u0628\u0627\u0628 \u06cc\u0647 \u0633\u06af \u067e\u0634\u0645\u0627\u0644\u0648 \u062f\u0627\u0631\u0647\u060c\u200c \u0627\u0633\u0645\u0634 \u0645\u0648\u0646\u06cc\u06a9\u0627\u0633. \u0642\u0633\u0645 \u0645\u06cc\u200c\u062e\u0648\u0631\u0647 \u0645\u06cc\u200c\u06af\u0647 \u0645\u0648\u0646\u06cc\u06a9\u0627 \u063a\u0630\u0627\u0634\u0648 \u0628\u0627 \u06a9\u0627\u0631\u062f \u0648 \u0686\u0646\u06af\u0627\u0644\n\u0645\u06cc\u200c\u062e\u0648\u0631\u0647. \u0627\u0644\u0644\u064e\u0647 \u0627\u06a9\u0628\u0631 \u0628\u0647 \u0627\u06cc\u0646 \u062f\u0631\u0648\u063a. \u06cc\u0647 \u067e\u06cc\u0631\u0632\u0646\u0647 \u0647\u0645 \u0647\u0633\u062a \u0633\u0631 \u06a9\u0648\u0686\u0645\u0648\u0646\u0647. \u0628\u0627 \u062e\u0648\u062f\u0634 \u062a\u0646\u0647\u0627\u06cc\u06cc \u0632\u0646\u062f\u06af\u06cc \u0645\u06cc\u200c\u06a9\u0646\u0647. \u0627\u0633\u0645\u0634 \u0646\u0646\u0647 \u063a\u0644\u0627\u0645\u0647. \u0647\u0634\u062a\u0627\u062f \u0646\u0648\u062f \u0633\u0627\u0644\u0634\u0647 \u0648\u0644\u06cc \u062e\u062c\u0627\u0644\u062a \u0646\u0645\u06cc\u200c\u06a9\u0634\u0647\u060c\u200c \u0627\u0632 \u0627\u0645\u0631\u06cc\u06a9\u0627 \u062e\u0648\u0634\u0634 \u0645\u06cc\u200c\u0622\u062f.\n\u0647\u0645\u0647 \u0627\u0632\u0634 \u0645\u06cc\u200c\u062a\u0631\u0633\u0646\u061b \u0647\u0631 \u0648\u0641\u062a \u0628\u06cc\u0627\u062f \u0628\u06cc\u0631\u0648\u0646\u060c \u0641\u062d\u0634 \u0645\u06cc\u200c\u062f\u0647\u060c \u062c\u06cc\u063a \u0648 \u0648\u06cc\u063a \u0645\u06cc\u200c\u0632\u0646\u0647. \u0645\u062b\u0644\u0627 \u0645\u0646 \u0627\u0630\u06cc\u062a\u0634 \u06a9\u0631\u062f\u0645\u060c \u0645\u06cc\u200c\u0622\u062f \u0633\u0631 \u0641\u062d\u0634\u200c\u0631\u0648 \u0645\u06cc\u200c\u06a9\u0634\u0647 \u0628\u0647 \u062a\u0648. \u0648\u0642\u062a\u06cc \u0628\u0686\u0647\u200c\u0647\u0627 \u0628\u062e\u0648\u0627\u0646 \u0644\u062c\u200c\u0634\u0648 \u062f\u0631\u200c\u0628\u06cc\u0627\u0631\u0646\u060c \u0645\u06cc\u200c\u06af\u0646: \u00ab\u0645\u0631\u06af \u0628\u0631";

var panX = 0, panY = 0, zoom = 1, angle = 0;
var animate = false, animSpeed = 0.5;
var dragging = false, lastX = 0, lastY = 0, startX = 0, startY = 0;

function updateTransform () {
  var cx = window.innerWidth / 2;
  var cy = window.innerHeight / 2;
  scene.style.transform =
    'translate(' + cx + 'px,' + cy + 'px) ' +
    'scale(' + zoom + ') ' +
    'rotate(' + angle + 'rad) ' +
    'translate(' + (panX - cx) + 'px,' + (panY - cy) + 'px)';
}

panX = (window.innerWidth - 900) / 2;
panY = 40;
updateTransform();

var fpsEl = document.getElementById('fps');
var frames = 0, lastTime = performance.now();
function loop () {
  requestAnimationFrame(loop);
  frames++;
  var now = performance.now();
  if (now - lastTime >= 1000) {
    fpsEl.textContent = Math.round(frames * 1000 / (now - lastTime)) + ' fps';
    frames = 0;
    lastTime = now;
  }
  if (animate) {
    angle += animSpeed * 0.016;
    updateTransform();
  }
}
loop();

document.addEventListener('mousedown', function (e) {
  dragging = true;
  lastX = startX = e.clientX;
  lastY = startY = e.clientY;
});
document.addEventListener('mouseup', function (e) {
  if (!dragging) return;
  dragging = false;
  var dx = e.clientX - startX, dy = e.clientY - startY;
  if (dx * dx + dy * dy < 25) animate = !animate;
});
document.addEventListener('mousemove', function (e) {
  if (!dragging) return;
  panX += e.clientX - lastX;
  panY += e.clientY - lastY;
  lastX = e.clientX;
  lastY = e.clientY;
  updateTransform();
});
document.addEventListener('wheel', function (e) {
  e.preventDefault();
  zoom *= Math.pow(1.001, -e.deltaY);
  updateTransform();
}, {passive: false});
document.addEventListener('keydown', function (e) {
  if (e.key === 'b') document.body.classList.toggle('dark');
  if (e.key === ' ') { animate = !animate; e.preventDefault(); }
  if (e.key === 'r') { panX = (window.innerWidth - 900) / 2; panY = 40; zoom = 1; angle = 0; animate = false; updateTransform(); }
});

var sel = document.getElementById('backend-sel');
sel.addEventListener('change', function () { sel.blur(); location.href = sel.value; });
</script>
